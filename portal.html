<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal — Aedex Anima</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2D6A4F;--green-dark:#1A4731;--green-light:#E8F5EE;
  --bg:#F7F6F2;--white:#FFFFFF;
  --text:#1C1B18;--text2:#4A4840;--text3:#8A8880;
  --border:#E2E0D8;--red:#B91C1C;--red-light:#FEE2E2;
  --amber:#B45309;--amber-light:#FEF3C7;
  --purple:#6D28D9;--purple-light:#EDE9FE;
  --r:12px;--shadow:0 2px 8px rgba(0,0,0,.08);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}
a{color:var(--green);text-decoration:none}

/* NAV */
nav{background:var(--text);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.nav-logo img{height:40px;width:auto;background:#fff;border-radius:6px;padding:4px 8px}
.nav-right{display:flex;align-items:center;gap:14px}
#nav-email{font-size:12px;color:rgba(255,255,255,.5);font-family:'DM Mono',monospace}
#logout-btn{display:none;background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
#logout-btn:hover{background:rgba(255,255,255,.1);color:#fff}

/* LAYOUT */
.outer{max-width:860px;margin:0 auto;padding:40px 24px}

/* LOGIN SCREEN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 68px);text-align:center}
.login-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:var(--shadow)}
.login-logo{margin:0 auto 24px;height:72px;width:auto}
.login-title{font-size:22px;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:28px;line-height:1.5}
.login-form{display:flex;flex-direction:column;gap:12px;text-align:left}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);display:block;margin-bottom:4px}
input[type=email]{width:100%;padding:11px 13px;font-size:14px;font-family:'DM Sans',sans-serif;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);transition:border-color .15s}
input[type=email]:focus{outline:none;border-color:var(--green);background:#fff}
.btn-login{background:var(--green);color:#fff;border:none;padding:12px;border-radius:8px;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .15s;width:100%}
.btn-login:hover{background:var(--green-dark)}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.login-note{font-size:12px;color:var(--text3);text-align:center;margin-top:4px}
.login-success{display:none;background:var(--green-light);border-radius:8px;padding:16px;font-size:14px;color:var(--green-dark);text-align:center;margin-top:8px}
.login-error{display:none;background:var(--red-light);border-radius:8px;padding:12px;font-size:13px;color:var(--red);margin-top:8px}

/* PORTAL SCREEN */
#portal-screen{display:none}
.portal-header{margin-bottom:28px}
.portal-title{font-size:24px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.portal-sub{font-size:14px;color:var(--text3)}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:14px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge.estimate-sent,.badge.estimate{background:#EFF6FF;color:#1D4ED8}
.badge.progress{background:var(--amber-light);color:var(--amber)}
.badge.awaiting-payment{background:var(--purple-light);color:var(--purple)}
.badge.paid{background:var(--green-light);color:var(--green-dark)}
.badge.unpaid{background:var(--red-light);color:var(--red)}
.badge.invoice{background:var(--purple-light);color:var(--purple)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:6px 10px;border-bottom:1px solid var(--border)}
td{padding:11px 10px;border-bottom:1px solid var(--bg);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafaf7}

/* EMPTY */
.empty{text-align:center;padding:32px;color:var(--text3);font-size:14px}

/* LOADING */
#loading-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 68px);gap:12px;color:var(--text3)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .outer{padding:20px 16px}
  .login-card{padding:28px 20px}
  table{font-size:12px}
  th,td{padding:8px 8px}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo"><img src="logo.png" alt="Aedex Anima"></a>
  <div class="nav-right">
    <span id="nav-email"></span>
    <button id="logout-btn" onclick="logout()">Sign out</button>
  </div>
</nav>

<!-- LOADING -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div>Loading your portal...</div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <img src="logo.png" alt="Aedex Anima" class="login-logo">
    <div class="login-title">Client Portal</div>
    <div class="login-sub">Enter your email and we'll send you a secure login link — no password needed.</div>
    <form class="login-form" onsubmit="requestLink(event)">
      <div>
        <label for="login-email">Email address</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn-login" id="login-btn">Send Login Link</button>
      <div class="login-note">We'll email you a link that logs you in instantly.</div>
      <div class="login-success" id="login-success">
        ✅ Link sent! Check your email and click the link to log in.
      </div>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<!-- PORTAL -->
<div id="portal-screen">
  <div class="outer">
    <div class="portal-header">
      <div class="portal-title">My Portal</div>
      <div class="portal-sub" id="portal-sub"></div>
    </div>

    <!-- JOBS -->
    <div class="card">
      <div class="card-title">Active Jobs</div>
      <div id="jobs-section"><div class="empty">Loading...</div></div>
    </div>

    <!-- ESTIMATES -->
    <div class="card">
      <div class="card-title">Estimates</div>
      <div id="estimates-section"><div class="empty">Loading...</div></div>
    </div>

    <!-- INVOICES -->
    <div class="card">
      <div class="card-title">Invoices</div>
      <div id="invoices-section"><div class="empty">Loading...</div></div>
    </div>
  </div>
</div>

<script>
const WORKER='https://aedex-portal.aedexanima.workers.dev';

// ── INIT ──────────────────────────────────────────────────────
async function init(){
  // Check if we're returning from a magic link
  const params=new URLSearchParams(location.search);
  const token=params.get('token');

  if(token){
    showLoading();
    // Remove token from URL
    history.replaceState({},'',location.pathname);
    await verifyToken(token);
    return;
  }

  // Check for existing session
  const session=localStorage.getItem('portal_session');
  if(session){
    showLoading();
    await loadPortal(session);
    return;
  }

  showLogin();
}

// ── REQUEST MAGIC LINK ────────────────────────────────────────
async function requestLink(e){
  e.preventDefault();
  const email=document.getElementById('login-email').value.trim();
  const btn=document.getElementById('login-btn');
  const success=document.getElementById('login-success');
  const error=document.getElementById('login-error');

  btn.textContent='Sending...';
  btn.disabled=true;
  success.style.display='none';
  error.style.display='none';

  try{
    const res=await fetch(`${WORKER}/auth/request-link`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email})
    });
    const data=await res.json();
    if(data.success){
      success.style.display='block';
      btn.textContent='Resend Link';
      btn.disabled=false;
    } else {
      throw new Error(data.error||'Something went wrong.');
    }
  }catch(err){
    error.textContent=err.message;
    error.style.display='block';
    btn.textContent='Send Login Link';
    btn.disabled=false;
  }
}

// ── VERIFY TOKEN ──────────────────────────────────────────────
async function verifyToken(token){
  try{
    const res=await fetch(`${WORKER}/auth/verify?token=${token}`);
    const data=await res.json();
    if(data.success){
      localStorage.setItem('portal_session',data.sessionToken);
      localStorage.setItem('portal_email',data.email);
      await loadPortal(data.sessionToken);
    } else {
      showLogin();
      document.getElementById('login-error').textContent=data.error||'This link has expired. Please request a new one.';
      document.getElementById('login-error').style.display='block';
    }
  }catch(err){
    showLogin();
  }
}

// ── LOAD PORTAL DATA ──────────────────────────────────────────
async function loadPortal(session){
  try{
    const res=await fetch(`${WORKER}/api/me`,{
      headers:{'Authorization':`Bearer ${session}`}
    });

    if(res.status===401){
      localStorage.removeItem('portal_session');
      localStorage.removeItem('portal_email');
      showLogin();
      return;
    }

    const data=await res.json();
    showPortal(data,session);
  }catch(err){
    showLogin();
  }
}

// ── RENDER PORTAL ─────────────────────────────────────────────
function showPortal(data, session){
  const email=localStorage.getItem('portal_email')||data.email||'';
  document.getElementById('nav-email').textContent=email;
  document.getElementById('logout-btn').style.display='inline-block';
  document.getElementById('portal-sub').textContent=`Logged in as ${email}`;

  // Jobs
  const jobs=data.jobs||[];
  const activeJobs=jobs.filter(j=>j.status!=='paid');
  document.getElementById('jobs-section').innerHTML=activeJobs.length
    ?`<div class="tbl-wrap"><table>
        <thead><tr><th>Job</th><th>Property</th><th>Status</th><th>Started</th></tr></thead>
        <tbody>${activeJobs.map(j=>`<tr>
          <td><strong>${esc(j.title)}</strong></td>
          <td style="color:var(--text2)">${esc(j.propertyAddress||'—')}</td>
          <td><span class="badge ${j.status}">${stageLabel(j.status)}</span></td>
          <td style="color:var(--text3)">${fmtDate(j.startDate)}</td>
        </tr>`).join('')}</tbody>
      </table></div>`
    :'<div class="empty">No active jobs at the moment.</div>';

  // Estimates
  const estimates=(data.documents||[]).filter(d=>d.type==='estimate');
  document.getElementById('estimates-section').innerHTML=estimates.length
    ?`<div class="tbl-wrap"><table>
        <thead><tr><th>Estimate #</th><th>Date</th><th>Total</th></tr></thead>
        <tbody>${estimates.map(d=>`<tr>
          <td><strong>${esc(d.number||'—')}</strong></td>
          <td style="color:var(--text3)">${fmtDate(d.date)}</td>
          <td style="font-family:'DM Mono',monospace">${fmt(d.total)}</td>
        </tr>`).join('')}</tbody>
      </table></div>`
    :'<div class="empty">No estimates on file.</div>';

  // Invoices
  const invoices=(data.documents||[]).filter(d=>d.type==='invoice');
  document.getElementById('invoices-section').innerHTML=invoices.length
    ?`<div class="tbl-wrap"><table>
        <thead><tr><th>Invoice #</th><th>Date</th><th>Total</th><th>Status</th></tr></thead>
        <tbody>${invoices.map(d=>`<tr>
          <td><strong>${esc(d.number||'—')}</strong></td>
          <td style="color:var(--text3)">${fmtDate(d.date)}</td>
          <td style="font-family:'DM Mono',monospace">${fmt(d.total)}</td>
          <td><span class="badge ${d.paid?'paid':'unpaid'}">${d.paid?'Paid':'Unpaid'}</span></td>
        </tr>`).join('')}</tbody>
      </table></div>`
    :'<div class="empty">No invoices on file.</div>';

  document.getElementById('loading-screen').style.display='none';
  document.getElementById('portal-screen').style.display='block';
}

// ── LOGOUT ─────────────────────────────────────────────────────
async function logout(){
  const session=localStorage.getItem('portal_session');
  if(session){
    fetch(`${WORKER}/auth/logout`,{method:'POST',headers:{'Authorization':`Bearer ${session}`}}).catch(()=>{});
  }
  localStorage.removeItem('portal_session');
  localStorage.removeItem('portal_email');
  showLogin();
}

// ── UI HELPERS ─────────────────────────────────────────────────
function showLoading(){
  document.getElementById('loading-screen').style.display='flex';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('portal-screen').style.display='none';
}
function showLogin(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('portal-screen').style.display='none';
  document.getElementById('logout-btn').style.display='none';
  document.getElementById('nav-email').textContent='';
}
function fmt(n){return'$'+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function fmtDate(d){if(!d||d==='—')return'—';try{const[y,m,dd]=d.split('T')[0].split('-');return`${m}/${dd}/${y}`;}catch{return d;}}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function stageLabel(s){return{['estimate-sent']:'Estimate Sent',['progress']:'In Progress',['awaiting-payment']:'Awaiting Payment',['paid']:'Paid'}[s]||s;}

init();
</script>
</body>
</html>
